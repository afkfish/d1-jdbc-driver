name: Release on merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    # Only run when the PR was actually merged (not just closed).
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------------
      # 1. Detect version bump type from PR labels.
      #    Expects a label named exactly "major" or "minor".
      #    If neither is present the workflow exits early without releasing.
      # -----------------------------------------------------------------------
      - name: Determine version bump from PR labels
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "No 'major' or 'minor' label found on this PR — skipping release."
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # All remaining steps are skipped when no version label is present.
      # -----------------------------------------------------------------------

      - name: Check out repository
        if: steps.bump.outputs.type != 'none'
        uses: actions/checkout@v4
        with:
          # Full history is needed so the version-bump commit can be pushed.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 11
        if: steps.bump.outputs.type != 'none'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Calculate new version
        if: steps.bump.outputs.type != 'none'
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)

          if [ "${{ steps.bump.outputs.type }}" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          else
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          fi

          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION"

      - name: Update version in pom.xml
        if: steps.bump.outputs.type != 'none'
        run: |
          mvn versions:set \
            -DnewVersion="${{ steps.version.outputs.new }}" \
            -DgenerateBackupPoms=false

      - name: Build fat JAR
        if: steps.bump.outputs.type != 'none'
        run: mvn package -q

      - name: Rename JAR to clean filename
        if: steps.bump.outputs.type != 'none'
        run: |
          rm "target/d1-jdbc-driver-${{ steps.version.outputs.new }}.jar" && \
          mv \
            "target/d1-jdbc-driver-${{ steps.version.outputs.new }}-jar-with-dependencies.jar" \
            "target/d1-jdbc-driver-${{ steps.version.outputs.new }}.jar"

      - name: Commit and push version bump
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push

      - name: Create GitHub release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new }}"
          name: "v${{ steps.version.outputs.new }}"
          # Auto-generates release notes from merged PRs and commits since the
          # last release, using GitHub's built-in release notes generator.
          generate_release_notes: true
          files: "target/d1-jdbc-driver-${{ steps.version.outputs.new }}.jar"
